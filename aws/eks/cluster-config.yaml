apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: order-management-cluster
  region: ap-south-1
  version: "1.32"

iam:
  withOIDC: true

managedNodeGroups:
  - name: app-nodes
    instanceType: t3.medium
    desiredCapacity: 2
    minSize: 2
    maxSize: 4
    volumeSize: 40

cloudWatch:
  clusterLogging:
    enableTypes:
      - api
      - audit
      - authenticator
      - controllerManager
      - scheduler
